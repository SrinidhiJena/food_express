<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — FoodExpress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="nav-container">
        <a href="index.html" class="nav-logo">🌿 FoodExpress</a>

        <button id="menu-toggle-btn" class="menu-toggle-btn" aria-label="Toggle Menu" type="button">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <div class="nav-menu-wrapper" id="nav-menu-wrapper">
            <ul class="nav-links">
                <li><a href="index.html" id="link-home">Home</a></li>
                <li><a href="index.html#menu" id="link-menu">Menu</a></li>
                <li><a href="index.html#about" id="link-about">About</a></li>
                <li class="nav-cart-wrap">
                    <a href="cart.html" id="link-cart" class="nav-cart">🛒 Cart <span class="cart-badge" id="cart-badge-count" style="display:none;">0</span></a>
                </li>
            </ul>
            <div class="nav-user-actions">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">☀️</button>
                <a href="login.html" class="btn btn-outline btn-sm guest-link" id="link-login">Sign In</a>
                <a href="orders.html" class="user-link nav-action-link" id="link-orders" style="display:none;">Orders</a>
                <div class="user-profile user-link" style="display:none; align-items:center; gap:0.5rem;">
                    <span id="welcome-msg" style="color:var(--text-2);font-weight:700;font-size:0.85rem;"></span>
                    <a href="#" id="logout-btn" class="btn btn-outline btn-sm" style="padding:3px 8px;font-size:0.72rem;margin:0;">Logout</a>
                </div>
            </div>
        </div>
    </nav>
</header>

<div class="cart-container">
    <h1>🛒 Your Cart</h1>
    <table>
        <thead>
            <tr>
                <th>Food Item</th>
                <th>Unit Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="cart-body">
            <!-- Dynamically rendered by script.js -->
        </tbody>
    </table>
    <div class="cart-actions">
        <a href="index.html" class="btn-secondary">← Continue Shopping</a>
        <a href="checkout.html" class="btn-primary">Proceed to Checkout →</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
